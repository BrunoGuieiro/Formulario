<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Formulário</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Formulário de Cadastro</h1>
        <form id="validationForm">
            <div class="form-group">
                <label for="name">Nome Completo *</label>
                <input type="text" id="name" placeholder="Digite seu nome completo">
                <span class="error-message" id="nameError">Por favor, insira seu nome completo</span>
            </div>

            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" placeholder="seuemail@gmail.com">
                <span class="error-message" id="emailError">Por favor, insira um e-mail Gmail válido</span>
            </div>

            <div class="form-group">
                <label for="cpf">CPF *</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                <span class="error-message" id="cpfError">Por favor, insira um CPF válido</span>
            </div>

            <div class="form-group">
                <label for="phone">Telefone *</label>
                <input type="tel" id="phone" placeholder="(00) 00000-0000" maxlength="15">
                <span class="error-message" id="phoneError">Por favor, insira um telefone válido</span>
            </div>

            <div class="form-group">
                <label for="message">Mensagem *</label>
                <textarea id="message" rows="4" placeholder="Digite sua mensagem"></textarea>
                <span class="error-message" id="messageError">Por favor, insira uma mensagem</span>
            </div>

            <button type="submit">Enviar Formulário</button>
        </form>
    </div>

    <div class="success-modal" id="successModal">
        <div class="modal-content">
            <div class="checkmark">✓</div>
            <h2>Sucesso!</h2>
            <p>Seu formulário foi enviado com sucesso.</p>
            <button class="close-btn" onclick="closeModal()">Fechar</button>
        </div>
    </div>

</body>
</html>
